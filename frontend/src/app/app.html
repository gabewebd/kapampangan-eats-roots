<main class="min-h-screen bg-[#FDF9F0] font-sans text-gray-900 w-full relative overflow-x-hidden flex flex-col pb-[90px] md:pb-0">
  
  <!-- Desktop Navigation (Hidden on mobile, hidden on admin routes) -->
  <nav *ngIf="showNav()" class="hidden md:flex items-center justify-between px-8 lg:px-10 py-4 absolute top-6 w-[calc(100%-4rem)] max-w-[1280px] z-50 text-white left-1/2 -translate-x-1/2 bg-gray-900/40 backdrop-blur-xl border border-white/15 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)]">
    <div class="font-serif text-2xl font-bold tracking-tight text-white drop-shadow-sm">Angeles Eats &amp; Roots</div>
    <div class="flex items-center gap-8 font-medium text-[15px]">
      <a routerLink="/" routerLinkActive="text-angeles-yellow font-bold !opacity-100" [routerLinkActiveOptions]="{exact: true}" class="drop-shadow-sm opacity-90 hover:text-angeles-yellow hover:opacity-100 transition-colors">Home</a>
      <a routerLink="/explore" routerLinkActive="text-angeles-yellow font-bold !opacity-100" class="drop-shadow-sm opacity-90 hover:text-angeles-yellow hover:opacity-100 transition-colors">Explore Map</a>
      <a routerLink="/submit" routerLinkActive="text-angeles-yellow font-bold !opacity-100" class="drop-shadow-sm opacity-90 hover:text-angeles-yellow hover:opacity-100 transition-colors">Submit</a>
      
      <ng-container *ngIf="isUserLoggedIn; else loginBtn">
        <a routerLink="/profile" routerLinkActive="bg-white/20" class="bg-white/15 hover:bg-white/25 border border-white/20 backdrop-blur-md px-6 py-2 rounded-full transition-all group flex items-center gap-2 shadow-sm font-bold active:scale-95">
          <lucide-icon [name]="userIcon" class="w-4 h-4"></lucide-icon>
          Profile
        </a>
      </ng-container>
      <ng-template #loginBtn>
        <a routerLink="/login" routerLinkActive="bg-white/20" class="bg-white/15 hover:bg-white/25 border border-white/20 backdrop-blur-md px-6 py-2 rounded-full transition-all group flex items-center gap-2 shadow-sm font-bold active:scale-95">
          <lucide-icon [name]="logInIcon" class="w-4 h-4"></lucide-icon>
          Login
        </a>
      </ng-template>
    </div>
  </nav>

  <router-outlet></router-outlet>

  <!-- Only shows on desktop due to internal styles -->
  <app-footer *ngIf="showNav()"></app-footer>

  <app-bottom-nav *ngIf="showNav()" class="block md:hidden"></app-bottom-nav>
</main>
