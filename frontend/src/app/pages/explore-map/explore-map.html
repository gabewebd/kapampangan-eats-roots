<div class="w-full min-h-screen relative overflow-hidden bg-[#E6ECE3] pb-[95px] md:pb-12 md:pt-28 font-sans">
  
  <!-- Real Map Container -->
  <div class="absolute inset-0 z-0">
    <div id="map" class="w-full h-full"></div>
  </div>

  <div class="max-w-[1440px] mx-auto h-full relative">
    <!-- Foreground UI: Header -->
    <div class="relative z-20 px-6 pt-12 md:pt-8 md:px-12 xl:px-16 flex justify-between items-start pointer-events-none">
      <!-- Title -->
      <div class="pointer-events-auto bg-white/70 backdrop-blur-md rounded-3xl p-4 md:p-6 shadow-xl border border-white/40 border-b-white/20 transition-transform duration-300 hover:-translate-y-1">
        <h1 class="font-serif text-[32px] md:text-5xl font-bold text-gray-900 leading-tight drop-shadow-sm">Explore Map</h1>
        <p class="text-[14px] md:text-lg text-gray-700 font-medium mt-1 drop-shadow-sm">Angeles City, Pampanga</p>
      </div>

      <!-- Controls Container -->
      <div class="pointer-events-auto flex items-center gap-3 relative">
        <!-- Map/List Toggle (Visual) -->
        <div class="bg-white/90 backdrop-blur-md p-1.5 rounded-full shadow-lg border border-white/60 items-center hidden md:flex shadow-blue-900/5 cursor-pointer">
          <button class="px-5 py-2 rounded-full bg-white shadow-sm text-angeles-blue font-bold transition-all text-sm">Map</button>
          <button class="px-5 py-2 rounded-full text-gray-500 hover:text-gray-900 font-bold transition-all text-sm hover:bg-gray-50">List</button>
        </div>

        <!-- Filter Button -->
        <button (click)="isFilterOpen.set(!isFilterOpen())" 
                class="bg-white hover:bg-gray-50 text-angeles-blue shadow-xl shadow-blue-900/10 rounded-full p-3.5 md:p-5 transition-all duration-300 hover:scale-105 active:scale-95 border border-white/60 group relative flex items-center justify-center">
          <lucide-icon [name]="filter" class="w-5 h-5 md:w-6 md:h-6 transform group-hover:-translate-y-0.5 transition-transform"></lucide-icon>
          <span *ngIf="selectedCategory() !== 'All'" class="absolute top-1 right-1 w-2.5 h-2.5 md:top-2 md:right-2 md:w-3 md:h-3 bg-red-500 border-2 border-white rounded-full"></span>
        </button>

        <!-- Filter Dropdown -->
        <div *ngIf="isFilterOpen()" 
             class="absolute top-full right-0 mt-4 w-64 bg-white/90 backdrop-blur-xl rounded-[32px] shadow-2xl border border-white/60 overflow-hidden p-2 z-[100] animate-in fade-in slide-in-from-top-4 duration-300">
          <div class="p-4 border-b border-gray-100/50">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Filter by Category</h3>
          </div>
          <div class="space-y-1 p-2">
            <button (click)="setFilter('All')" 
                    [class.bg-angeles-blue]="selectedCategory() === 'All'"
                    [class.text-white]="selectedCategory() === 'All'"
                    class="w-full text-left px-4 py-3 rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors flex items-center justify-between">
              All Spots
              <lucide-icon *ngIf="selectedCategory() === 'All'" name="check" class="w-4 h-4"></lucide-icon>
            </button>
            <button (click)="setFilter('Local Eatery')" 
                    [class.bg-angeles-blue]="selectedCategory() === 'Local Eatery'"
                    [class.text-white]="selectedCategory() === 'Local Eatery'"
                    class="w-full text-left px-4 py-3 rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors flex items-center justify-between">
              Local Eateries
              <lucide-icon *ngIf="selectedCategory() === 'Local Eatery'" name="check" class="w-4 h-4"></lucide-icon>
            </button>
            <button (click)="setFilter('Heritage Site')" 
                    [class.bg-angeles-blue]="selectedCategory() === 'Heritage Site'"
                    [class.text-white]="selectedCategory() === 'Heritage Site'"
                    class="w-full text-left px-4 py-3 rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors flex items-center justify-between">
              Heritage Sites
              <lucide-icon *ngIf="selectedCategory() === 'Heritage Site'" name="check" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Map UI Overlay: Locate Me -->
    <button (click)="locateMe()" 
            class="absolute bottom-6 right-6 md:bottom-12 md:right-12 z-20 pointer-events-auto bg-white p-4 md:p-5 rounded-3xl shadow-2xl border border-white/60 text-angeles-blue hover:scale-105 active:scale-95 transition-all flex items-center gap-2 font-bold text-sm shadow-blue-900/10 hover:shadow-blue-900/20">
      <lucide-icon name="navigation" class="w-5 h-5 md:w-6 md:h-6"></lucide-icon>
      <span class="hidden md:inline">Locate Me</span>
    </button>
  </div>
</div>
