<div class="explore-map-wrapper">
  <!-- Map Container - ALWAYS in DOM -->
  <div #mapContainer class="explore-map-container"></div>

  <!-- Foreground UI: Header -->
  <div class="explore-map-ui">
    <div class="explore-map-header">
      <!-- Title -->
      <div class="pointer-events-auto bg-white/70 backdrop-blur-md rounded-3xl p-4 md:p-6 shadow-xl border border-white/40 border-b-white/20 transition-transform duration-300 hover:-translate-y-1">
        <h1 class="font-serif text-[32px] md:text-5xl font-bold text-gray-900 leading-tight drop-shadow-sm">Explore Map</h1>
        <p class="text-[14px] md:text-lg text-gray-700 font-medium mt-1 drop-shadow-sm">Pampanga</p>
      </div>

      <!-- Controls Container -->
      <div class="pointer-events-auto flex items-center gap-3">
        <!-- Filter Button -->
        <button (click)="isFilterOpen.set(!isFilterOpen())" class="bg-white hover:bg-gray-50 text-angeles-blue shadow-xl shadow-blue-900/10 rounded-full p-3.5 md:p-5 transition-all duration-300 hover:scale-105 active:scale-95 border border-white/60 group relative flex items-center justify-center">
          <lucide-icon [name]="filter" class="w-5 h-5 md:w-6 md:h-6 transform group-hover:-translate-y-0.5 transition-transform"></lucide-icon>
          <span class="absolute top-1 right-1 w-2.5 h-2.5 md:top-2 md:right-2 md:w-3 md:h-3 bg-red-500 border-2 border-white rounded-full"></span>
        </button>
      </div>
    </div>

    <!-- Filter Dropdown -->
    <div *ngIf="isFilterOpen()" 
         class="explore-map-filter-dropdown">
      <div class="flex flex-col gap-1">
        <button (click)="setFilter('All')" 
                [class.bg-gray-100]="selectedCategory() === 'All'"
                class="px-4 py-3 rounded-2xl text-left hover:bg-gray-50 transition-colors font-medium text-gray-700 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-blue-500"></span>
          All Categories
        </button>
        <button (click)="setFilter('Local Eatery')" 
                [class.bg-gray-100]="selectedCategory() === 'Local Eatery'"
                class="px-4 py-3 rounded-2xl text-left hover:bg-gray-50 transition-colors font-medium text-gray-700 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full" style="background-color: #004A99"></span>
          Local Eateries
        </button>
        <button (click)="setFilter('Heritage Site')" 
                [class.bg-gray-100]="selectedCategory() === 'Heritage Site'"
                class="px-4 py-3 rounded-2xl text-left hover:bg-gray-50 transition-colors font-medium text-gray-700 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full" style="background-color: #C8102E"></span>
          Heritage Sites
        </button>
      </div>
    </div>

    <!-- Locate Me FAB -->
    <button (click)="locateMe()" class="explore-map-locate-btn pointer-events-auto bg-white/90 backdrop-blur-md text-angeles-blue p-4 rounded-full shadow-2xl border border-white hover:scale-110 active:scale-95 transition-all duration-300 group">
      <lucide-icon [name]="navigationIcon" class="w-6 h-6 group-hover:animate-bounce"></lucide-icon>
    </button>
  </div>
</div>
