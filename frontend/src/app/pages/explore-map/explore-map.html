<div class="w-full min-h-screen relative overflow-hidden bg-[#E6ECE3] pb-[95px] md:pb-12 md:pt-28 font-sans">
  
  <!-- Real Map Container -->
  <div class="absolute inset-0 z-0">
    <div id="map" class="w-full h-full"></div>
  </div>

  <div class="max-w-[1440px] mx-auto h-full relative">
    <!-- Foreground UI: Header -->
    <div class="relative z-20 px-6 pt-12 md:pt-8 md:px-12 xl:px-16 flex justify-between items-start pointer-events-none">
      <!-- Title -->
      <div class="pointer-events-auto bg-white/70 backdrop-blur-md rounded-3xl p-4 md:p-6 shadow-xl border border-white/40 border-b-white/20 transition-transform duration-300 hover:-translate-y-1">
        <h1 class="font-serif text-[32px] md:text-5xl font-bold text-gray-900 leading-tight drop-shadow-sm">Explore Map</h1>
        <p class="text-[14px] md:text-lg text-gray-700 font-medium mt-1 drop-shadow-sm">Angeles City, Pampanga</p>
      </div>
      
      <!-- Filter Button -->
      <button class="pointer-events-auto bg-white hover:bg-gray-50 text-angeles-blue shadow-xl shadow-blue-900/10 rounded-full p-3.5 md:p-5 transition-all duration-300 hover:scale-105 active:scale-95 border border-white/60 group">
        <lucide-icon [name]="filter" class="w-5 h-5 md:w-7 md:h-7 transform group-hover:-translate-y-0.5 transition-transform"></lucide-icon>
      </button>
    </div>

    <!-- Map UI Overlay (Bottom section if needed or just empty space for map) -->
    <div class="absolute inset-0 z-10 pointer-events-none">
      <!-- We can add other overlays here if needed, but for now we let the map be clickable -->
    </div>
  </div>
</div>
