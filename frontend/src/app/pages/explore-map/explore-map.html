<div class="w-full min-h-screen relative overflow-hidden bg-[#eff3f0] font-sans">
  
  <!-- Real Map Container -->
  <div id="map" class="absolute inset-0 z-0"></div>

  <!-- Overlay UI -->
  <div class="max-w-[1440px] mx-auto h-full relative pointer-events-none">
    
    <!-- Floating Header -->
    <div class="relative z-20 px-6 pt-12 md:pt-16 flex justify-between items-start">
      <!-- Title Box -->
      <div class="pointer-events-auto bg-white/90 backdrop-blur-md rounded-[32px] p-6 shadow-2xl border border-white/60 transition-transform duration-300 hover:-translate-y-1 max-w-[280px] md:max-w-none">
        <h1 class="font-serif text-[32px] md:text-5xl font-bold text-gray-900 leading-tight">Explore Map</h1>
        <p class="text-[14px] md:text-lg text-gray-600 font-medium mt-1">Angeles City, Pampanga</p>
      </div>

      <!-- Actions Area -->
      <div class="pointer-events-auto flex items-center gap-4">
        <!-- Filter Button -->
        <div class="relative">
          <button (click)="isFilterOpen.set(!isFilterOpen())" 
                  class="bg-white hover:bg-gray-50 text-angeles-blue shadow-2xl rounded-full p-4 md:p-6 transition-all duration-300 hover:scale-105 active:scale-95 border border-white/60 relative flex items-center justify-center">
            <lucide-icon [name]="filter" class="w-6 h-6"></lucide-icon>
            <span *ngIf="selectedCategory() !== 'All'" class="absolute top-2 right-2 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full"></span>
          </button>

          <!-- Filter Dropdown -->
          <div *ngIf="isFilterOpen()" 
               class="absolute top-full right-0 mt-4 w-72 bg-white/95 backdrop-blur-xl rounded-[32px] shadow-2xl border border-white/60 overflow-hidden p-2 z-[100] animate-in fade-in slide-in-from-top-4 duration-300 pointer-events-auto">
            <div class="p-4 border-b border-gray-100/50">
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest text-center">Site Categories</h3>
            </div>
            <div class="space-y-1 p-2">
              <button (click)="setFilter('All')" 
                      [class.bg-angeles-blue]="selectedCategory() === 'All'"
                      [class.text-white]="selectedCategory() === 'All'"
                      class="w-full text-left px-5 py-4 rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors flex items-center justify-between">
                All Spots
                <lucide-icon *ngIf="selectedCategory() === 'All'" name="check" class="w-4 h-4"></lucide-icon>
              </button>
              <button (click)="setFilter('Local Eatery')" 
                      [class.bg-angeles-blue]="selectedCategory() === 'Local Eatery'"
                      [class.text-white]="selectedCategory() === 'Local Eatery'"
                      class="w-full text-left px-5 py-4 rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors flex items-center justify-between">
                Local Eateries
                <lucide-icon *ngIf="selectedCategory() === 'Local Eatery'" name="check" class="w-4 h-4"></lucide-icon>
              </button>
              <button (click)="setFilter('Heritage Site')" 
                      [class.bg-angeles-blue]="selectedCategory() === 'Heritage Site'"
                      [class.text-white]="selectedCategory() === 'Heritage Site'"
                      class="w-full text-left px-5 py-4 rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors flex items-center justify-between">
                Heritage Sites
                <lucide-icon *ngIf="selectedCategory() === 'Heritage Site'" name="check" class="w-4 h-4"></lucide-icon>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Controls -->
    <div class="absolute bottom-12 right-6 md:right-12 flex flex-col items-end gap-3 pointer-events-auto">
       <button (click)="locateMe()" 
               class="bg-white p-5 rounded-full shadow-2xl border border-white/60 text-angeles-blue hover:scale-105 active:scale-95 transition-all flex items-center gap-3 font-bold text-sm">
        <lucide-icon name="navigation" class="w-6 h-6"></lucide-icon>
        <span class="hidden md:inline">Locate Me</span>
      </button>
    </div>

  </div>
</div>
